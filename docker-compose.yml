version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stack-shield-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: super_secret_password_2026
      POSTGRES_DB: stack_shield
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: